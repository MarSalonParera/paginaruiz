<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>

    <!-- Bootstrap CSS -->
        <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="">
</head>
<body>
<form id="formulaire" class="container mt-5 mb-5">

    <div class="card p-4">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Prénom *</label>
                <input type="text" name="prenom" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Nom *</label>
                <input type="text" name="nom" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Entreprise *</label>
                <input type="text" name="entreprise" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">N° TVA / SIRET *</label>
                <input type="text" name="siret" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Téléphone *</label>
                <input type="tel" name="telephone" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">E-mail *</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="col-12 mb-3">
                <label class="form-label">Adresse *</label>
                <input type="text" name="adresse" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Ville *</label>
                <input type="text" name="ville" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Code Postal *</label>
                <input type="text" name="codepostal" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Département *</label>

                <select name="departement" class="form-select" required>
                    <option value="">Sélectionner</option>
                    <option>Pyrénées-Orientales (66)</option>
                    <option>Aude (11)</option>
                    <option>Hérault (34)</option>
                    <option>Gard (30)</option>
                    <option>Haute-Garonne (31)</option>
                </select>

            </div>

            <div class="col-12 mb-4">

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="conditions"
                        required>

                    <label class="form-check-label" for="conditions">

                        J'ai lu et j'accepte les
                        <a href="#">conditions générales</a>
                        et la
                        <a href="#">politique de confidentialité</a>

                    </label>

                </div>

            </div>

            <div class="col-12">

                <button type="submit" class="btn btn-primary">
                    Envoyer la demande
                </button>

            </div>

        </div>

    </div>

</form>


<div class="footer">
    <footer class="bg-light text-center text-lg-start">
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
          © 2024 Copyright:
          <a class="text-dark" href="#">TechnologieDuRoussillon.com</a>
        </div>
      </footer>
</div>

<script>

document.getElementById("formulaire")
.addEventListener("submit", function(e){

    e.preventDefault();

    const entreprise =
    document.querySelector('[name="entreprise"]').value;

    const email =
    document.querySelector('[name="email"]').value;

    /* GUARDAR EMPRESA */

    localStorage.setItem(
        "empresaNombre",
        entreprise
    );

    /* GUARDAR EMAIL */

    localStorage.setItem(
        "empresaEmail",
        email
    );

    /* INICIAR SESION */

    localStorage.setItem(
        "usuario",
        email
    );

    alert(
        "Compte créé avec succès !"
    );

    window.location.href =
    "index.html";

});

</script>
</body>
</html>
