<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>

    <!-- Bootstrap CSS -->
        <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="./css/style.css">
</head>
<body>
    <nav class="navbar navbar-custom">

        <div class="container-fluid d-flex justify-content-between align-items-center">

            <h2>Technologie  du roussillon</h2>

        </div>
    </nav>
<div class="container mt-5">
    <h2>Mi cuenta</h2>

    <div id="userBox" class="mb-4">
        <!-- Info de usuario -->
    </div>

    <h4>Pedidos</h4>
    <div id="ordersBox"></div>

    <div class="mt-4">
        <button id="logoutBtn" class="btn btn-secondary">Cerrar sesión</button>
    </div>

</div>
<script src="./auth-cart.js"></script>
<script>
function renderAccount(){
    const user = getCurrentUser();
    const userBox = document.getElementById('userBox');
    const ordersBox = document.getElementById('ordersBox');
    if(!user){
        userBox.innerHTML = '<p>No has iniciado sesión. <a href="inciarsession.html">Inicia sesión</a></p>';
        ordersBox.innerHTML = '';
        return;
    }

    userBox.innerHTML = `<p><strong>Nombre:</strong> ${user.name}</p><p><strong>Email:</strong> ${user.email}</p>`;

    const ordersKey = 'orders_'+ user.id;
    const orders = JSON.parse(localStorage.getItem(ordersKey) || '[]');
    if(orders.length === 0) ordersBox.innerHTML = '<p>No tienes pedidos.</p>';
    else{
        ordersBox.innerHTML = '';
        orders.slice().reverse().forEach(o=>{
            const div = document.createElement('div');
            div.className = 'card p-3 mb-2';
            div.innerHTML = `<div><strong>${o.id}</strong> - ${new Date(o.date).toLocaleString()}</div><div>Total: ${o.total}€</div><div>Items: ${o.items.map(i=>i.name).join(', ')}</div>`;
            ordersBox.appendChild(div);
        });
    }
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
    signOut();
    window.location.href = 'index.html';
});

document.addEventListener('DOMContentLoaded', ()=>{
    renderAccount();
});
</script>
<div class="footer">
    <footer class="bg-light text-center text-lg-start">
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
          © 2024 Copyright:
          <a class="text-dark" href="#">TechnologieDuRoussillon.com</a>
        </div>
      </footer>
</div>
</body>
</html>
