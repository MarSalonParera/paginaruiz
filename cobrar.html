<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobrar</title>

    <!-- Bootstrap -->
        <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="./css/style.css">

</head>
<body class="p-5">

    <div class="container">

        <h1>💳 Pago</h1>

        <hr>

        <form id="payForm">
        <div class="mb-3">

            <label class="form-label">
                Número de tarjeta
            </label>

            <input id="cardNumber"
            type="text" 
            class="form-control" placeholder="4242 4242 4242 4242" required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Nombre del titular
            </label>

            <input id="cardName"
            type="text" 
            class="form-control" required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                CVV
            </label>

            <input id="cardCvv"
            type="password" 
            class="form-control" required>

        </div>

        <button class="btn btn-success" type="submit">Pagar</button>
        </form>

    </div>
<div>
    <a href="./index.html" class="btn btn-primary">Volver a inicio</a>
</div>
<div class="footer">
    <footer class="bg-light text-center text-lg-start">
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
          © 2024 Copyright:
          <a class="text-dark" href="#">TechnologieDuRoussillon.com</a>
        </div>
      </footer>
</div>
</body>
<script src="./auth-cart.js"></script>
<script>
document.getElementById('payForm').addEventListener('submit', function(e){
    e.preventDefault();

    // Pago simulado
    const cart = getCart();
    if(cart.length === 0){ alert('La cesta está vacía'); return; }

    const total = cart.reduce((s,it)=> s + (it.price||0), 0);
    const order = createOrder({items: cart, total});
    clearCart();
    alert('Pago simulado OK. Pedido creado: ' + order.id + '\nTotal: ' + total + '€');
    window.location.href = 'cuenta.html';
});
</script>
</html>
