<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesta</title>

    <!-- Bootstrap -->
       <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="./css/style.css">

</head>
<body class="p-5">

    <!-- CESTA -->
    <h3>
        🛒 Mi cesta: 
        <span id="contador">0</span>
    </h3>

    <hr>

    <!-- PRODUCTO -->
    <div class="card p-3 w-25">

        <h4>Monitor Gaming</h4>

        <p>199€</p>

        <!-- AÑADIR -->
        <button 
        class="btn btn-primary mb-2"
        onclick="añadirProducto('Monitor Gaming')">

            Añadir producto

        </button>

        <!-- COMPRAR -->
        <button 
        class="btn btn-success"
        onclick="comprar()">

            Comprar

        </button>

    </div>

    <div class="card p-3 w-25">

        <h4>Portátil HP</h4>

        <p>799€</p>

        <!-- AÑADIR -->
        <button 
        class="btn btn-primary mb-2"
        onclick="añadirProducto('Portátil HP')">

            Añadir producto

        </button>

        <!-- COMPRAR -->
        <button 
        class="btn btn-success"
        onclick="comprar()">

            Comprar

        </button>
    <script>

        // Obtener cesta guardada
        let cesta = JSON.parse(localStorage.getItem("cesta")) || [];

        // Mostrar contador
        actualizarContador();

        // Añadir producto
        function añadirProducto(producto){

            // Añadir a la cesta
            cesta.push(producto);

            // Guardar
            localStorage.setItem("cesta", JSON.stringify(cesta));

            // Actualizar número
            actualizarContador();

        }

        // Actualizar contador
        function actualizarContador(){

            document.getElementById("contador").innerHTML =
            cesta.length;

        }

        // Comprar
        function comprar(){

            // Ir a cobrar.html
            window.location.href = "cobrar.html";

        }

    </script>

</body>
</html>
