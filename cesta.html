<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesta</title>

    <!-- Bootstrap -->
       <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="./css/style.css">

</head>
<body class="p-5">


    <h3>🛒 Mi cesta: <span id="contador">0</span></h3>

    <hr>

    <div id="productosList" class="d-flex gap-3 flex-wrap">
        <!-- Productos de ejemplo -->
    </div>

    <div class="mt-4">
        <button class="btn btn-success" id="comprarBtn">Comprar</button>
    </div>

    <hr>
    <h4>Contenido de la cesta</h4>
    <div id="cartItems"></div>

<script src="./auth-cart.js"></script>
<script>
// Productos de ejemplo
const productosEjemplo = [
    {name: 'Monitor Gaming', price: 199},
    {name: 'Portátil HP', price: 799},
    {name: 'Teclado Mecánico', price: 79}
];

const productosList = document.getElementById('productosList');

function renderProductos(){
    productosList.innerHTML = '';
    productosEjemplo.forEach((p, i)=>{
        const card = document.createElement('div');
        card.className = 'card p-3';
        card.style.width = '220px';
        card.innerHTML = `<h5>${p.name}</h5><p>${p.price}€</p><button class="btn btn-primary" data-i="${i}">Añadir</button>`;
        productosList.appendChild(card);
    });
}

renderProductos();

productosList.addEventListener('click', (e)=>{
    if(e.target.tagName === 'BUTTON'){
        const idx = e.target.getAttribute('data-i');
        const prod = productosEjemplo[idx];
        addToCart({name: prod.name, price: prod.price});
        actualizarContador();
        alert('Añadido: ' + prod.name);
        renderCartItems();
    }
});

function actualizarContador(){
    const count = getCart().length;
    document.getElementById('contador').textContent = count;
    const cc = document.getElementById('cartCount');
    if(cc) cc.textContent = '('+ count +')';
}

document.getElementById('comprarBtn').addEventListener('click', ()=>{
    window.location.href = 'cobrar.html';
});

// Inicializar contador
actualizarContador();
renderCartItems();

function renderCartItems(){
    const items = getCart();
    const box = document.getElementById('cartItems');
    if(!box) return;
    if(items.length === 0){ box.innerHTML = '<p>La cesta está vacía.</p>'; return; }
    box.innerHTML = '';
    let total = 0;
    items.forEach((it, i)=>{
        total += (parseFloat(it.price) || 0);
        const div = document.createElement('div');
        div.className = 'd-flex align-items-center justify-content-between p-2 border mb-2';
        const imgHtml = it.img ? `<img src="${it.img}" style="width:60px;height:60px;object-fit:cover;margin-right:10px">` : '';
        const priceText = it.price ? (it.price + '€') : '';
        div.innerHTML = `
            <div class="d-flex align-items-center">
                ${imgHtml}
                <div>
                    <div><strong>${it.name || it.title || 'Producto'}</strong></div>
                    <div><small>${priceText}</small></div>
                </div>
            </div>
            <div>
                <button class="btn btn-sm btn-danger" data-remove="${i}">Eliminar</button>
            </div>`;
        box.appendChild(div);
    });
    const totalDiv = document.createElement('div');
    totalDiv.className = 'mt-3';
    totalDiv.innerHTML = `<h5>Total: ${total}€</h5>`;
    box.appendChild(totalDiv);

    // attach remove handlers
    box.querySelectorAll('button[data-remove]').forEach(btn=>{
        btn.addEventListener('click', function(e){
            const idx = parseInt(this.getAttribute('data-remove'));
            if(!isNaN(idx)){
                const c = getCart(); c.splice(idx,1); saveCart(c); actualizarContador(); renderCartItems();
            }
        });
    });
}

</script>

</body>
</html>
