<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <!-- Bootstrap -->
       <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="./css/style.css">

</head>
<body>

   <nav class="navbar-custom">

    <div class="d-flex align-items-center justify-content-between w-100">

        <!-- IZQUIERDA -->
        <div class="d-flex align-items-center gap-3">

            <div class="logo">
                🖥️
            </div>

            <h1 class="titulo">
                Technologie  du roussillon
            </h1>

        </div>
</nav>

<div class="container mt-5">
    <h2 id="formTitle">Iniciar Sesión</h2>

    <div class="mb-3">
        <button class="btn btn-outline-primary" id="toggleForm">¿No tienes cuenta? Regístrate</button>
    </div>

    <form id="authForm">

        <div class="mb-3" id="nombreGroup" style="display:none;">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" />
        </div>

        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" id="email" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" required />
        </div>

        <button type="submit" class="btn btn-primary" id="submitAuth">Iniciar sesión</button>

        <button type="button" class="btn btn-danger ms-2" id="googleBtn">Continuar con Google (demo)</button>

    </form>

</div>
<div class="footer">
    <footer class="bg-light text-center text-lg-start">
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
          © 2024 Copyright:
          <a class="text-dark" href="#">TechnologieDuRoussillon.com</a>
        </div>
      </footer>
</div>
<script src="./auth-cart.js"></script>
<script>
// Manejo simple de formulario: toggle registro/login
let signup = false;
const toggleBtn = document.getElementById('toggleForm');
const nombreGroup = document.getElementById('nombreGroup');
const formTitle = document.getElementById('formTitle');
const submitBtn = document.getElementById('submitAuth');

toggleBtn.addEventListener('click', ()=>{
    signup = !signup;
    nombreGroup.style.display = signup ? 'block' : 'none';
    submitBtn.textContent = signup ? 'Crear cuenta' : 'Iniciar sesión';
    formTitle.textContent = signup ? 'Crear cuenta' : 'Iniciar sesión';
    toggleBtn.textContent = signup ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate';
});

document.getElementById('authForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('nombre').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;

    if(signup){
        const res = signUp({name: name || email.split('@')[0], email, password: pass});
        if(!res.success){ alert(res.message); return; }
        window.location.href = 'index.html';
    } else {
        const res = signIn(email, pass);
        if(!res.success){ alert(res.message); return; }
        window.location.href = 'index.html';
    }
});

document.getElementById('googleBtn').addEventListener('click', ()=>{
    googleSignIn();
    window.location.href = 'index.html';
});

</script>

</body>
</html>
