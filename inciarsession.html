<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <!-- Bootstrap -->
       <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">

<!-- TU CSS -->
<link 
rel="stylesheet" 
href="./css/style.css">

</head>
<body>

   <nav class="navbar-custom">

    <div class="d-flex align-items-center justify-content-between w-100">

        <!-- IZQUIERDA -->
        <div class="d-flex align-items-center gap-3">

            <div class="logo">
                🖥️
            </div>

            <h1 class="titulo">
                Technologie  du roussillon
            </h1>

        </div>
</nav>

   <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
        </div>
        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit">Ingresar</button>
    </form>
    <p id="mensaje"></p>
</div>

<script>
    // Base de datos simulada (solo para el ejemplo)
    const usuarioValido = "admin";
    const passwordValido = "123456";

    const formulario = document.getElementById('loginForm');
    const mensajeDiv = document.getElementById('mensaje');

    formulario.addEventListener('submit', function(evento) {
        // Evita que la página se recargue al enviar el formulario
        evento.preventDefault(); 

        const usuarioIngresado = document.getElementById('usuario').value;
        const passwordIngresado = document.getElementById('password').value;

        if (usuarioIngresado === usuarioValido && passwordIngresado === passwordValido) {
            mensajeDiv.style.color = "green";
            mensajeDiv.textContent = "¡Inicio de sesión exitoso! Redirigiendo...";
            
            // Simula una redirección tras iniciar sesión
            setTimeout(() => {
                window.location.href = "index.html"; 
            }, 1000);
        } else {
            mensajeDiv.style.color = "red";
            mensajeDiv.textContent = "Usuario o contraseña incorrectos.";
        }
    });
</script>
</body>
</html>
